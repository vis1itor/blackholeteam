<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Hole — всё в одном</title>
    <style>
        /* ===== ТЕМЫ ===== */
        :root {
            --bg: radial-gradient(ellipse at 20% 50%, #1a0a2e, #0a0a0f 70%);
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #fff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --card-bg: rgba(255, 255, 255, 0.04);
            --input-bg: rgba(255, 255, 255, 0.05);
        }
        .light-theme {
            --bg: radial-gradient(ellipse at 20% 50%, #e8e0f0, #f5f0fa 70%);
            --glass: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text: #1a1a2e;
            --text-dim: rgba(0, 0, 0, 0.5);
            --card-bg: rgba(255, 255, 255, 0.6);
            --input-bg: rgba(255, 255, 255, 0.8);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            transition: 0.3s;
        }
        .glass-container {
            max-width: 760px;
            width: 100%;
            padding: 30px 25px;
            border-radius: 32px;
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }
        .glass-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.04), transparent 60%);
            pointer-events: none;
        }
        .logo {
            font-size: 2.2em;
            font-weight: 900;
            color: #f0b800;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 40px rgba(240, 184, 0, 0.15);
            position: relative;
            z-index: 1;
        }
        .subtitle {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.95em;
            margin-top: 4px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }
        .theme-toggle {
            background: none;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 6px 14px;
            color: var(--text);
            cursor: pointer;
            font-size: 0.85em;
            transition: 0.2s;
            position: relative;
            z-index: 1;
        }
        .theme-toggle:hover {
            background: var(--card-bg);
        }
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 8px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.8em;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            min-width: 60px;
            position: relative;
            z-index: 1;
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }
        .tab-btn.active {
            background: rgba(240, 184, 0, 0.15);
            border-color: rgba(240, 184, 0, 0.3);
            color: #f0b800;
        }
        .tab-btn .badge {
            background: #ff4444;
            color: #fff;
            border-radius: 50%;
            padding: 1px 6px;
            font-size: 0.6em;
            margin-left: 4px;
        }
        .tab-content {
            display: none;
            position: relative;
            z-index: 1;
        }
        .tab-content.active {
            display: block;
        }
        .glass-input {
            width: 100%;
            padding: 12px 14px;
            margin: 6px 0 12px 0;
            border: none;
            border-radius: 16px;
            background: var(--input-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            color: var(--text);
            font-size: 1em;
            transition: 0.2s;
            outline: none;
            position: relative;
            z-index: 1;
        }
        .glass-input:focus {
            border-color: rgba(240, 184, 0, 0.3);
            box-shadow: 0 0 20px rgba(240, 184, 0, 0.05);
        }
        .glass-input::placeholder {
            color: var(--text-dim);
            opacity: 0.5;
        }
        select.glass-input {
            appearance: none;
            cursor: pointer;
        }
        select.glass-input option {
            background: #1a1a2e;
            color: #fff;
        }
        textarea.glass-input {
            resize: vertical;
            min-height: 70px;
            font-family: inherit;
        }
        .glass-btn {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            z-index: 1;
        }
        .btn-gold {
            background: linear-gradient(145deg, #f0b800, #d4a400);
            color: #0a0a0f;
            box-shadow: 0 8px 24px rgba(240, 184, 0, 0.2);
        }
        .btn-gold:hover {
            transform: scale(1.01);
            box-shadow: 0 12px 32px rgba(240, 184, 0, 0.35);
        }
        .btn-ghost {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            border: 1px solid var(--glass-border);
        }
        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }
        .btn-danger {
            background: rgba(255, 50, 50, 0.12);
            color: #ff6666;
            border: 1px solid rgba(255, 50, 50, 0.15);
        }
        .btn-danger:hover {
            background: rgba(255, 50, 50, 0.2);
        }
        .btn-small {
            padding: 6px 12px;
            font-size: 0.8em;
            width: auto;
            display: inline-block;
            margin: 2px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-edit {
            background: rgba(100, 180, 255, 0.15);
            color: #66ccff;
            border: 1px solid rgba(100, 180, 255, 0.1);
        }
        .btn-edit:hover {
            background: rgba(100, 180, 255, 0.25);
        }
        .btn-delete {
            background: rgba(255, 50, 50, 0.12);
            color: #ff6666;
            border: 1px solid rgba(255, 50, 50, 0.1);
        }
        .btn-delete:hover {
            background: rgba(255, 50, 50, 0.25);
        }
        .btn-fav {
            background: rgba(240, 184, 0, 0.1);
            color: #f0b800;
            border: 1px solid rgba(240, 184, 0, 0.1);
        }
        .btn-fav.active {
            background: rgba(240, 184, 0, 0.25);
        }
        .btn-chat {
            background: rgba(0, 200, 150, 0.1);
            color: #66ddbb;
            border: 1px solid rgba(0, 200, 150, 0.1);
        }
        .btn-chat:hover {
            background: rgba(0, 200, 150, 0.2);
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.85em;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
            display: inline-block;
            position: relative;
            z-index: 1;
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 16px 18px;
            margin: 10px 0;
            transition: 0.2s;
            position: relative;
            z-index: 1;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
        }
        .card-title {
            color: #f0b800;
            font-weight: 700;
            font-size: 1.1em;
        }
        .card-tags {
            color: var(--text-dim);
            font-size: 0.8em;
            opacity: 0.6;
        }
        .card-desc {
            color: var(--text);
            font-size: 0.95em;
            line-height: 1.5;
            opacity: 0.8;
        }
        .card-contacts {
            color: var(--text-dim);
            font-size: 0.85em;
            opacity: 0.5;
        }
        .card-img {
            max-width: 100%;
            max-height: 120px;
            border-radius: 12px;
            margin: 6px 0;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.05);
        }
        .card-actions {
            margin-top: 8px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .divider {
            margin: 16px 0;
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--glass-border), transparent);
        }
        .message {
            text-align: center;
            margin: 8px 0;
            font-size: 0.95em;
        }
        .message.success {
            color: #66cc88;
        }
        .message.error {
            color: #ff6666;
        }
        .hidden {
            display: none !important;
        }
        .user-greeting {
            color: var(--text);
            font-size: 1.05em;
            opacity: 0.8;
        }
        .user-greeting span {
            color: #f0b800;
            font-weight: 700;
        }
        .footer-note {
            margin-top: 20px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75em;
            letter-spacing: 1px;
            opacity: 0.2;
        }
        .filter-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }
        .filter-row select,
        .filter-row input {
            width: 100%;
            padding: 10px 14px;
            border: none;
            border-radius: 14px;
            background: var(--input-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            color: var(--text);
            font-size: 0.95em;
            outline: none;
        }
        .filter-row select option {
            background: #1a1a2e;
            color: #fff;
        }
        .type-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .badge-team {
            background: rgba(240, 184, 0, 0.2);
            color: #f0b800;
            border: 1px solid rgba(240, 184, 0, 0.15);
        }
        .badge-work {
            background: rgba(0, 180, 255, 0.15);
            color: #66ccff;
            border: 1px solid rgba(0, 180, 255, 0.1);
        }
        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }
        .profile-field {
            color: var(--text-dim);
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 6px;
            opacity: 0.5;
        }
        .profile-value {
            color: var(--text);
            font-size: 1em;
        }
        .clickable-author {
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.2s;
            padding: 2px 8px;
            border-radius: 8px;
            display: inline-block;
            opacity: 0.6;
        }
        .clickable-author:hover {
            color: #f0b800;
            background: rgba(240, 184, 0, 0.1);
            opacity: 1;
        }
        .chat-messages {
            max-height: 250px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .chat-messages .msg {
            padding: 6px 10px;
            margin: 4px 0;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.9em;
        }
        .chat-messages .msg .sender {
            color: #f0b800;
            font-weight: 600;
        }
        .chat-messages .msg .time {
            color: var(--text-dim);
            font-size: 0.7em;
            margin-left: 8px;
            opacity: 0.3;
        }
        .chat-input-row {
            display: flex;
            gap: 8px;
        }
        .chat-input-row input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 14px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--text);
            outline: none;
        }
        .chat-input-row button {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            background: #f0b800;
            color: #0a0a0f;
            font-weight: 700;
            cursor: pointer;
        }
        .edit-form {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 12px;
            margin: 8px 0;
        }
        .search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .search-row input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 14px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--text);
            outline: none;
        }
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            margin: 6px 0 10px 0;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .file-input-wrapper .file-label {
            display: block;
            padding: 12px;
            border-radius: 16px;
            background: var(--input-bg);
            border: 1px dashed var(--glass-border);
            color: var(--text-dim);
            text-align: center;
            font-size: 0.9em;
            cursor: pointer;
            transition: 0.2s;
        }
        .file-input-wrapper .file-label:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(240, 184, 0, 0.3);
            color: var(--text);
        }
        .file-input-wrapper .file-label.has-file {
            border-color: #f0b800;
            color: #f0b800;
            background: rgba(240, 184, 0, 0.05);
        }
        .preview-img {
            max-width: 100%;
            max-height: 100px;
            border-radius: 12px;
            margin: 6px 0;
        }
        .online-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            margin-right: 4px;
        }
        .online-dot.offline {
            background: #666;
        }
        .comments {
            margin-top: 10px;
            border-top: 1px solid var(--glass-border);
            padding-top: 10px;
        }
        .comments .comment {
            padding: 6px 0;
            font-size: 0.9em;
            color: var(--text);
            opacity: 0.7;
        }
        .comments .comment .c-author {
            color: #f0b800;
            font-weight: 600;
        }
        .comments .comment .c-time {
            color: var(--text-dim);
            font-size: 0.7em;
            opacity: 0.3;
        }
        .comments .comment-input-row {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .comments .comment-input-row input {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 12px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--text);
            outline: none;
            font-size: 0.9em;
        }
        .comments .comment-input-row button {
            padding: 8px 16px;
            border: none;
            border-radius: 12px;
            background: #f0b800;
            color: #0a0a0f;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.8em;
        }
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a2e;
            color: #fff;
            padding: 12px 20px;
            border-radius: 16px;
            border: 1px solid rgba(240, 184, 0, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 999;
            animation: slideIn 0.3s ease;
            max-width: 300px;
        }
        .notification .notif-title {
            color: #f0b800;
            font-weight: 700;
            font-size: 0.9em;
        }
        .notification .notif-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85em;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .sort-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .sort-row select {
            padding: 8px 12px;
            border: none;
            border-radius: 12px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--text);
            outline: none;
            font-size: 0.85em;
        }
        .share-btn {
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.8em;
            opacity: 0.4;
            transition: 0.2s;
        }
        .share-btn:hover {
            opacity: 1;
            color: #f0b800;
        }
        .views {
            color: var(--text-dim);
            font-size: 0.7em;
            opacity: 0.3;
        }
        @media (max-width: 480px) {
            .glass-container {
                padding: 16px 12px;
            }
            .logo {
                font-size: 1.8em;
            }
            .tab-btn {
                font-size: 0.7em;
                padding: 8px 4px;
                min-width: 40px;
            }
            .glass-input {
                padding: 10px 12px;
                font-size: 0.9em;
            }
            .glass-btn {
                padding: 10px;
                font-size: 0.9em;
            }
            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="glass-container" id="app">
        <div class="top-bar">
            <div class="logo">🕳️ BLACK HOLE</div>
            <button class="theme-toggle" id="themeToggle">🌓 тема</button>
        </div>
        <div class="subtitle">найди команду или работу в геймдеве</div>

        <!-- АВТОРИЗАЦИЯ -->
        <div id="authBlock">
            <input class="glass-input" type="text" id="loginInput" placeholder="придумай логин" />
            <input class="glass-input" type="password" id="passInput" placeholder="придумай пароль" />
            <select class="glass-input" id="regRole">
                <option value="не указана">выбери свою роль</option>
                <option>программист</option>
                <option>художник</option>
                <option>композитор</option>
                <option>геймдизайнер</option>
                <option>тестировщик</option>
                <option>продюсер</option>
            </select>
            <input class="glass-input" type="text" id="regBio" placeholder="расскажи о себе (необязательно)" />
            <button class="glass-btn btn-gold" id="registerBtn">зарегистрироваться</button>
            <button class="glass-btn btn-ghost" id="loginBtn">войти</button>
            <div id="authMessage" class="message"></div>
        </div>

        <!-- ПОЛЬЗОВАТЕЛЬ -->
        <div id="userBlock" class="hidden">
            <div class="user-greeting">👋 привет, <span id="userName"></span></div>
            <button class="glass-btn btn-danger" id="logoutBtn" style="margin-top:4px;">выйти</button>
            <button class="glass-btn btn-ghost" id="editProfileBtn" style="margin-top:4px;">✏️ редактировать профиль</button>

            <div id="editProfileForm" class="hidden edit-form">
                <h4 style="color:#f0b800;">редактировать профиль</h4>
                <select class="glass-input" id="editRole">
                    <option>программист</option>
                    <option>художник</option>
                    <option>композитор</option>
                    <option>геймдизайнер</option>
                    <option>тестировщик</option>
                    <option>продюсер</option>
                </select>
                <select class="glass-input" id="editEngine">
                    <option>godot</option>
                    <option>unity</option>
                    <option>unreal</option>
                    <option>свой</option>
                    <option>не указан</option>
                </select>
                <input class="glass-input" type="text" id="editBio" placeholder="о себе" />
                <input class="glass-input" type="text" id="editContacts" placeholder="контакты" />
                <button class="glass-btn btn-gold" id="saveProfileBtn">сохранить</button>
                <button class="glass-btn btn-ghost" id="cancelEditProfileBtn">отмена</button>
            </div>

            <hr class="divider" />

            <!-- ТАБЫ -->
            <div class="tabs" id="tabButtons">
                <button class="tab-btn active" data-tab="search">🔍 поиск</button>
                <button class="tab-btn" data-tab="create">➕ создать</button>
                <button class="tab-btn" data-tab="work">💼 работа</button>
                <button class="tab-btn" data-tab="favorites">⭐ избранное</button>
            </div>

            <!-- ПОИСК -->
            <div class="tab-content active" id="tabSearch">
                <div class="search-row">
                    <input type="text" id="searchText" placeholder="🔍 поиск по тексту" oninput="renderAll()" />
                </div>
                <div class="filter-row">
                    <select id="filterRole" onchange="renderAll()">
                        <option value="all">все роли</option>
                        <option>программист</option>

    <script>
        // ============================================================
        // БАЗА ДАННЫХ (localStorage)
        // ============================================================
        function getUsers() {
            try { return JSON.parse(localStorage.getItem('users')) || {}; } catch { return {}; }
        }

        function saveUsers(u) { localStorage.setItem('users', JSON.stringify(u)); }

        function getAds() {
            try { return JSON.parse(localStorage.getItem('ads')) || []; } catch { return []; }
        }

        function saveAds(a) { localStorage.setItem('ads', JSON.stringify(a)); }

        function getProfiles() {
            try { return JSON.parse(localStorage.getItem('profiles')) || {}; } catch { return {}; }
        }

        function saveProfiles(p) { localStorage.setItem('profiles', JSON.stringify(p)); }

        function getFavorites() {
            try { return JSON.parse(localStorage.getItem('favorites')) || {}; } catch { return {}; }
        }

        function saveFavorites(f) { localStorage.setItem('favorites', JSON.stringify(f)); }

        function getChats() {
            try { return JSON.parse(localStorage.getItem('chats')) || {}; } catch { return {}; }
        }

        function saveChats(c) { localStorage.setItem('chats', JSON.stringify(c)); }

        function getComments() {
            try { return JSON.parse(localStorage.getItem('comments')) || {}; } catch { return {}; }
        }

        function saveComments(c) { localStorage.setItem('comments', JSON.stringify(c)); }

        function getOnline() {
            try { return JSON.parse(localStorage.getItem('online')) || {}; } catch { return {}; }
        }

        function saveOnline(o) { localStorage.setItem('online', JSON.stringify(o)); }

        let currentUser = localStorage.getItem('currentUser') || null;
        let currentChatPartner = null;
        let editingAdId = null;
        let selectedImageData = null;
        let theme = localStorage.getItem('theme') || 'dark';

        // ============================================================
        // ТЕМА
        // ============================================================
        function toggleTheme() {
            theme = theme === 'dark' ? 'light' : 'dark';
            document.body.classList.toggle('light-theme', theme === 'light');
            localStorage.setItem('theme', theme);
        }
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        if (theme === 'light') document.body.classList.add('light-theme');

        // ============================================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function timeAgo(dateStr) {
            if (!dateStr) return 'только что';
            const now = new Date();
            const then = new Date(dateStr);
            const diff = Math.floor((now - then) / 1000);
            if (diff < 60) return 'только что';
            if (diff < 3600) return Math.floor(diff / 60) + ' мин назад';
            if (diff < 86400) return Math.floor(diff / 3600) + ' ч назад';
            if (diff < 172800) return 'вчера';
            return then.toLocaleDateString('ru-RU') + ' ' + then.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function getAvatarColor(login) {
            const colors = ['#f0b800', '#66ccff', '#ff6666', '#66cc88', '#cc66ff', '#ff9966', '#66ffcc'];
            let hash = 0;
            for (let i = 0; i < login.length; i++) { hash = login.charCodeAt(i) + ((hash << 5) - hash); }
            return colors[Math.abs(hash) % colors.length];
        }

        function avatarHtml(login) {
            const color = getAvatarColor(login);
            const letter = login.charAt(0).toUpperCase();
            return `<div class="profile-avatar" style="background:${color}30;border:2px solid ${color};color:${color};">${letter}</div>`;
        }

        function getChatId(user1, user2) {
            return [user1, user2].sort().join('_');
        }

        function getFavsForUser(user) {
            const f = getFavorites();
            return f[user] || [];
        }

        function toggleFav(adId) {
            const favs = getFavsForUser(currentUser);
            const idx = favs.indexOf(adId);
            if (idx > -1) favs.splice(idx, 1);
            else favs.push(adId);
            const all = getFavorites();
            all[currentUser] = favs;
            saveFavorites(all);
            renderAll();
        }

        function getUnreadCount(user) {
            const chats = getChats();
            let count = 0;
            for (const key in chats) {
                const msgs = chats[key];
                const unread = msgs.filter(m => m.sender !== user && !m.read);
                count += unread.length;
            }
            return count;
        }

        function notify(title, text) {
            const el = document.createElement('div');
            el.className = 'notification';
            el.innerHTML = `<div class="notif-title">${title}</div><div class="notif-text">${text}</div>`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        function shareAd(id) {
            const url = window.location.href + '?ad=' + id;
            navigator.clipboard.writeText(url).then(() => {
                notify('🔗 ссылка скопирована', 'отправь её друзьям');
            }).catch(() => {
                prompt('скопируй ссылку:', url);
            });
        }

        function exportPDF(id) {
            const ads = getAds();
            const ad = ads.find(a => a.id === id);
            if (!ad) return;
            const text = `Объявление: ${ad.title}\nАвтор: ${ad.author}\nРоль: ${ad.role}\nДвижок: ${ad.engine}\nОписание: ${ad.description}\nКонтакты: ${ad.contacts}`;
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `ad-${id}.txt`;
            a.click();
            URL.revokeObjectURL(a.href);
            notify('📄 экспорт готов', 'файл скачан');
        }

        // ============================================================
        // АВТОРИЗАЦИЯ
        // ============================================================
        function showUser() {
            document.getElementById('authBlock').classList.add('hidden');
            document.getElementById('userBlock').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser;
            const profiles = getProfiles();
            if (!profiles[currentUser]) {
                profiles[currentUser] = { role: 'не указана', engine: 'не указан', bio: '—', contacts: 'не указаны' };
                saveProfiles(profiles);
            }
            // Онлайн-статус
            const online = getOnline();
            online[currentUser] = new Date().toISOString();
            saveOnline(online);
            renderAll();
            document.getElementById('profileBlock').classList.add('hidden');
            document.getElementById('chatBlock').classList.add('hidden');
            document.getElementById('editAdBlock').classList.add('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('hidden'));
            document.getElementById('tabSearch').classList.remove('hidden');
            document.getElementById('tabCreate').classList.remove('hidden');
            document.getElementById('tabWork').classList.remove('hidden');
            document.getElementById('tabFavorites').classList.remove('hidden');
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tabSearch').classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.tab-btn[data-tab="search"]').classList.add('active');
            // Уведомления в чате
            const unread = getUnreadCount(currentUser);
            const chatTab = document.querySelector('.tab-btn[data-tab="chat"]');
            if (chatTab) {
                chatTab.innerHTML = '💬 чат' + (unread > 0 ? `<span class="badge">${unread}</span>` : '');
            }
            renderAll();
        }

        function registerUser() {
            const login = document.getElementById('loginInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();
            const role = document.getElementById('regRole').value;
            const bio = document.getElementById('regBio').value.trim();
            const msg = document.getElementById('authMessage');
            if (!login || !pass) { msg.innerText = '❌ заполни логин и пароль';
                msg.className = 'message error'; return; }
            if (login.length < 3 || pass.length < 3) { msg.innerText = '❌ минимум 3 символа';
                msg.className = 'message error'; return; }
            const users = getUsers();
            if (users[login]) { msg.innerText = '❌ уже есть';
                msg.className = 'message error'; return; }
            users[login] = pass;
            saveUsers(users);
            const profiles = getProfiles();
            profiles[login] = { role: role || 'не указана', engine: 'не указан', bio: bio || '—', contacts: 'не указаны' };
            saveProfiles(profiles);
            msg.innerText = '✅ регистрация успешна! войди.';
            msg.className = 'message success';
        }

        function loginUser() {
            const login = document.getElementById('loginInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();
            const msg = document.getElementById('authMessage');
            if (!login || !pass) { msg.innerText = '❌ заполни все поля';
                msg.className = 'message error'; return; }
            const users = getUsers();
            if (!users[login]) { msg.innerText = '❌ не найден';
                msg.className = 'message error'; return; }
            if (users[login] !== pass) { msg.innerText = '❌ неверный пароль';
                msg.className = 'message error'; return; }
            currentUser = login;
            localStorage.setItem('currentUser', login);
            msg.innerText = '';
            showUser();
            // Уведомление о входе
            notify('👋 добро пожаловать', 'ты в Black Hole');
        }

        function logoutUser() {
            const online = getOnline();
            delete online[currentUser];
            saveOnline(online);
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('authBlock').classList.remove('hidden');
            document.getElementById('userBlock').classList.add('hidden');
        }

        // ============================================================
        // ПРОФИЛЬ
        // ============================================================
        function openProfile(login) {
            const profiles = getProfiles();
            const profile = profiles[login] || { role: 'не указана', engine: 'не указан', bio: '—', contacts: 'не указаны' };
            const ads = getAds().filter(ad => ad.author === login);

            document.getElementById('profileAvatar').parentElement.innerHTML = avatarHtml(login) +
                document.getElementById('profileAvatar').parentElement.innerHTML;
            document.getElementById('profileLogin').innerText = login;
            document.getElementById('profileRole').innerText = profile.role || 'не указана';
            document.getElementById('profileEngine').innerText = profile.engine || 'не указан';
            document.getElementById('profileBio').innerText = profile.bio || '—';
            document.getElementById('profileContacts').innerText = profile.contacts || 'не указаны';

            const container = document.getElementById('profileAds');
            if (ads.length === 0) { container.innerHTML =
                '<div style="color:var(--text-dim);padding:8px 0;opacity:0.2;">нет объявлений</div>'; } else {
                let html = '';
                ads.forEach(ad => {
                    const badge = ad.type === 'team' ? '<span class="type-badge badge-team">🔍 команда</span>' :
                        '<span class="type-badge badge-work">💼 работа</span>';
                    html += `
                            <div class="glass-card" style="margin:8px 0;padding:12px 16px;cursor:default;">
                                ${badge}
                                <div class="card-title" style="font-size:1em;">${ad.title}</div>
                                <div class="card-tags">🎮 ${ad.role} · ⚙️ ${ad.engine}</div>
                                <div class="card-desc" style="font-size:0.9em;">${ad.description}</div>
                                ${ad.image ? `<img src="${ad.image}" class="card-img" />` : ''}
                            </div>
                        `;
                });
                container.innerHTML = html;
            }

            document.getElementById('profileChatBtn').onclick = function() { openChat(login); };

            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('hidden'));
            document.getElementById('profileBlock').classList.remove('hidden');
            document.getElementById('chatBlock').classList.add('hidden');
        }

        function closeProfile() {
            document.getElementById('profileBlock').classList.add('hidden');
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tabSearch').classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.tab-btn[data-tab="search"]').classList.add('active');
            renderAll();
        }

        // ============================================================
        // РЕДАКТИРОВАНИЕ ПРОФИЛЯ
        // ============================================================
        document.getElementById('editProfileBtn').addEventListener('click', function() {
            const p = getProfiles()[currentUser] || {};
            document.getElementById('editRole').value = p.role || 'не указана';
            document.getElementById('editEngine').value = p.engine || 'не указан';
            document.getElementById('editBio').value = p.bio || '';
            document.getElementById('editContacts').value = p.contacts || '';
            document.getElementById('editProfileForm').classList.toggle('hidden');
        });

        document.getElementById('cancelEditProfileBtn').addEventListener('click', function() {
            document.getElementById('editProfileForm').classList.add('hidden');
        });

        document.getElementById('saveProfileBtn').addEventListener('click', function() {
            const profiles = getProfiles();
            profiles[currentUser] = {
                role: document.getElementById('editRole').value,
                engine: document.getElementById('editEngine').value,
                bio: document.getElementById('editBio').value.trim() || '—',
                contacts: document.getElementById('editContacts').value.trim() || 'не указаны'
            };
            saveProfiles(profiles);
            document.getElementById('editProfileForm').classList.add('hidden');
            notify('✅ профиль обновлён', 'данные сохранены');
            renderAll();
        });

        // ============================================================
        // ОБЪЯВЛЕНИЯ
        // ============================================================
        document.getElementById('adImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                selectedImageData = event.target.result;
                document.getElementById('adImagePreview').innerHTML = `<img src="${selectedImageData}" class="preview-img" />`;
                document.getElementById('adImageLabel').textContent = '✅ фото выбрано';
                document.getElementById('adImageLabel').classList.add('has-file');
            };
            reader.readAsDataURL(file);
        });

        function createAd() {
            const type = document.getElementById('adType').value;
            const role = document.getElementById('adRole').value;
            const engine = document.getElementById('adEngine').value;
            const title = document.getElementById('adTitle').value.trim();
            const description = document.getElementById('adDesc').value.trim();
            const contacts = document.getElementById('adContacts').value.trim();
            const msg = document.getElementById('adMessage');

            if (!title || !description) { msg.innerText = '❌ заполни всё';
                msg.className = 'message error'; return; }

            const ads = getAds();
            ads.push({
                id: Date.now(),
                type: type,
                author: currentUser,
                role: role || 'не указана',
                engine: engine || 'не указан',
                title: title,
                description: description,
                contacts: contacts || 'не указаны',
                image: selectedImageData || null,
                createdAt: new Date().toISOString(),
                views: 0
            });
            saveAds(ads);

            selectedImageData = null;
            document.getElementById('adImagePreview').innerHTML = '';
            document.getElementById('adImageLabel').textContent = '📷 прикрепить фото';
            document.getElementById('adImageLabel').classList.remove('has-file');
            document.getElementById('adImage').value = '';
            document.getElementById('adTitle').value = '';
            document.getElementById('adDesc').value = '';
            document.getElementById('adContacts').value = '';
            document.getElementById('adRole').value = '';
            document.getElementById('adEngine').value = '';
            msg.innerText = '✅ опубликовано!';
            msg.className = 'message success';
            notify('📢 объявление создано', title);
            renderAll();
        }

        function deleteAd(id) {
            if (!confirm('удалить объявление?')) return;
            let ads = getAds();
            ads = ads.filter(ad => ad.id !== id);
            saveAds(ads);
            notify('🗑️ удалено', 'объявление удалено');
            renderAll();
        }

        function startEditAd(id) {
            const ads = getAds();
            const ad = ads.find(a => a.id === id);
            if (!ad) return;
            editingAdId = id;
            document.getElementById('editAdTitle').value = ad.title;
            document.getElementById('editAdDesc').value = ad.description;
            document.getElementById('editAdContacts').value = ad.contacts;
            document.getElementById('editAdBlock').classList.remove('hidden');
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('hidden'));
        }

        function saveAdEdit() {
            const title = document.getElementById('editAdTitle').value.trim();
            const description = document.getElementById('editAdDesc').value.trim();
            const contacts = document.getElementById('editAdContacts').value.trim();
            if (!title || !description) { alert('заполни всё'); return; }
            let ads = getAds();
            const idx = ads.findIndex(a => a.id === editingAdId);
            if (idx > -1) {
                ads[idx].title = title;
                ads[idx].description = description;
                ads[idx].contacts = contacts || 'не указаны';
                saveAds(ads);
            }
            document.getElementById('editAdBlock').classList.add('hidden');
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tabSearch').classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.tab-btn[data-tab="search"]').classList.add('active');
            notify('✏️ обновлено', 'объявление изменено');
            renderAll();
        }

        document.getElementById('cancelAdEditBtn').addEventListener('click', function() {
            document.getElementById('editAdBlock').classList.add('hidden');
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tabSearch').classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.tab-btn[data-tab="search"]').classList.add('active');
        });

        document.getElementById('saveAdEditBtn').addEventListener('click', saveAdEdit);
        document.getElementById('editAdBackBtn').addEventListener('click', function() {
            document.getElementById('editAdBlock').classList.add('hidden');
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tabSearch').classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.tab-btn[data-tab="search"]').classList.add('active');
        });

        // ============================================================
        // КОММЕНТАРИИ
        // ============================================================
        function addComment(adId) {
            const input = document.getElementById('commentInput_' + adId);
            const text = input.value.trim();
            if (!text) return;
            const comments = getComments();
            if (!comments[adId]) comments[adId] = [];
            comments[adId].push({
                author: currentUser,
                text: text,
                time: new Date().toISOString()
            });
            saveComments(comments);
            input.value = '';
            renderAll();
            notify('💬 комментарий добавлен', text);
        }

        function renderComments(adId) {
            const comments = getComments();
            const list = comments[adId] || [];
            if (list.length === 0) return '';
            let html = `<div class="comments">`;
            list.forEach(c => {
                html += `
                        <div class="comment">
                            <span class="c-author">${c.author}</span>
                            <span class="c-time">${timeAgo(c.time)}</span>
                            ${c.text}
                        </div>
                    `;
            });
            html += `
                    <div class="comment-input-row">
                        <input type="text" id="commentInput_${adId}" placeholder="написать комментарий..." />
                        <button onclick="addComment(${adId})">→</button>
                    </div>
                </div>
            `;
            return html;
        }

        // ============================================================
        // ЧАТ
        // ============================================================
        function openChat(partner) {
            currentChatPartner = partner;
            document.getElementById('chatPartnerName').innerText = '💬 ' + partner;
            document.getElementById('chatBlock').classList.remove('hidden');
            document.getElementById('profileBlock').classList.add('hidden');
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('hidden'));
            renderChat();
        }

        function closeChat() {
            currentChatPartner = null;
            document.getElementById('chatBlock').classList.add('hidden');
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tabSearch').classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.tab-btn[data-tab="search"]').classList.add('active');
            renderAll();
        }

        function renderChat() {
            const chatId = getChatId(currentUser, currentChatPartner);
            const chats = getChats();
            const messages = chats[chatId] || [];
            const container = document.getElementById('chatMessages');
            if (messages.length === 0) {
                container.innerHTML =
                    '<div style="color:var(--text-dim);text-align:center;padding:20px 0;opacity:0.2;">нет сообщений</div>';
                return;
            }
            let html = '';
            messages.forEach(m => {
                const isMe = m.sender === currentUser;
                html += `
                        <div class="msg" style="text-align:${isMe ? 'right' : 'left'};background:${isMe ? 'rgba(240,184,0,0.1)' : 'rgba(255,255,255,0.03)'};">
                            <span class="sender">${m.sender}</span>
                            <span class="time">${timeAgo(m.time)}</span>
                            <div>${m.text}</div>
                        </div>
                    `;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
            // Пометить как прочитанные
            if (messages.some(m => m.sender !== currentUser && !m.read)) {
                const allChats = getChats();
                allChats[chatId] = allChats[chatId].map(m => {
                    if (m.sender !== currentUser && !m.read) m.read = true;
                    return m;
                });
                saveChats(allChats);
            }
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !currentChatPartner) return;
            const chatId = getChatId(currentUser, currentChatPartner);
            const chats = getChats();
            if (!chats[chatId]) chats[chatId] = [];
            chats[chatId].push({ sender: currentUser, text, time: new Date().toISOString(), read: false });
            saveChats(chats);
            input.value = '';
            renderChat();
            notify('💬 сообщение отправлено', text);
        }

        document.getElementById('chatSendBtn').addEventListener('click', sendChatMessage);
        document.getElementById('chatInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendChatMessage();
        });
        document.getElementById('chatBackBtn').addEventListener('click', closeChat);

        // ============================================================
        // ОТРИСОВКА
        // ============================================================
        function renderAdsList(containerId, filterType, roleFilterId, engineFilterId, searchInputId, favMode) {
            const container = document.getElementById(containerId);
            const ads = getAds();
            const roleFilter = document.getElementById(roleFilterId);
            const engineFilter = document.getElementById(engineFilterId);
            const searchText = document.getElementById(searchInputId) ? document.getElementById(searchInputId).value
            .toLowerCase() : '';
            const favs = getFavsForUser(currentUser);
            const sortType = document.getElementById(containerId === 'searchResults' ? 'sortSearch' : 'sortWork')?.value || 'date';

            let filtered = ads.filter(ad => {
                if (filterType && ad.type !== filterType) return false;
                if (roleFilter && roleFilter.value !== 'all' && ad.role !== roleFilter.value) return false;
                if (engineFilter && engineFilter.value !== 'all' && ad.engine !== engineFilter.value) return false;
                if (favMode && !favs.includes(ad.id)) return false;
                if (searchText && !ad.title.toLowerCase().includes(searchText) && !ad.description.toLowerCase().includes(
                    searchText)) return false;
                return true;
            });

            if (sortType === 'views') {
                filtered.sort((a, b) => (b.views || 0) - (a.views || 0));
            } else {
                filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }

            if (filtered.length === 0) {
                container.innerHTML =
                    '<div style="color:var(--text-dim);text-align:center;padding:20px 0;opacity:0.2;">пока ничего нет</div>';
                return;
            }

            let html = '';
            filtered.forEach(ad => {
                // Увеличиваем просмотры (только если не своё)
                if (ad.author !== currentUser) {
                    ad.views = (ad.views || 0) + 1;
                    const allAds = getAds();
                    const idx = allAds.findIndex(a => a.id === ad.id);
                    if (idx > -1) allAds[idx].views = ad.views;
                    saveAds(allAds);
                }
                const isFav = favs.includes(ad.id);
                const badge = ad.type === 'team' ? '<span class="type-badge badge-team">🔍 ищу команду</span>' :
                    '<span class="type-badge badge-work">💼 ищу работу</span>';
                const isOwn = ad.author === currentUser;
                const commentsHtml = renderComments(ad.id);
                html += `
                        <div class="glass-card" id="ad-${ad.id}">
                            ${badge}
                            <div class="card-title">${ad.title}</div>
                            <div class="card-tags">🎮 ${ad.role} · ⚙️ ${ad.engine} · ${timeAgo(ad.createdAt)} <span class="views">👁️ ${ad.views || 0}</span></div>
                            <div class="card-desc">${ad.description}</div>
                            ${ad.image ? `<img src="${ad.image}" class="card-img" />` : ''}
                            <div class="card-contacts">
                                📱 ${ad.contacts}
                                <span class="clickable-author" onclick="openProfile('${ad.author}')">· ✉️ ${ad.author}</span>
                            </div>
                            <div class="card-actions">
                                <button class="btn-small btn-fav ${isFav?'active':''}" onclick="toggleFav(${ad.id})">${isFav?'★':'☆'}</button>
                                ${isOwn ? `
                                    <button class="btn-small btn-edit" onclick="startEditAd(${ad.id})">✏️</button>
                                    <button class="btn-small btn-delete" onclick="deleteAd(${ad.id})">🗑️</button>
                                ` : `
                                    <button class="btn-small btn-chat" onclick="openChat('${ad.author}')">💬</button>
                                `}
                                <button class="btn-small btn-ghost" onclick="shareAd(${ad.id})" style="font-size:0.7em;padding:4px 8px;">🔗</button>
                                <button class="btn-small btn-ghost" onclick="exportPDF(${ad.id})" style="font-size:0.7em;padding:4px 8px;">📄</button>
                            </div>
                            ${commentsHtml}
                        </div>
                    `;
            });
            container.innerHTML = html;
        }

        function renderAll() {
            renderAdsList('searchResults', 'team', 'filterRole', 'filterEngine', 'searchText', false);
            renderAdsList('workResults', 'work', 'filterWorkRole', 'filterWorkEngine', 'searchTextWork', false);
            renderAdsList('favoritesResults', null, 'filterRole', 'filterEngine', null, true);
        }

        // ============================================================
        // ВКЛАДКИ
        // ============================================================
        document.getElementById('tabButtons').addEventListener('click', function(e) {
            const btn = e.target.closest('.tab-btn');
            if (!btn) return;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tabId = btn.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab' + tabId.charAt(0).toUpperCase() + tabId.slice(1)).classList.add('active');
        });

        document.getElementById('profileBackBtn').addEventListener('click', closeProfile);
        document.getElementById('registerBtn').addEventListener('click', registerUser);
        document.getElementById('loginBtn').addEventListener('click', loginUser);
        document.getElementById('logoutBtn').addEventListener('click', logoutUser);
        document.getElementById('publishBtn').addEventListener('click', createAd);

        document.getElementById('filterRole').addEventListener('change', renderAll);
        document.getElementById('filterEngine').addEventListener('change', renderAll);
        document.getElementById('filterWorkRole').addEventListener('change', renderAll);
        document.getElementById('filterWorkEngine').addEventListener('change', renderAll);

        // ============================================================
        // ОНЛАЙН-СТАТУС (обновляем каждые 30 сек)
        // ============================================================
        setInterval(() => {
            if (currentUser) {
                const online = getOnline();
                online[currentUser] = new Date().toISOString();
                saveOnline(online);
            }
            // Очищаем офлайн (старше 2 мин)
            const online = getOnline();
            const now = new Date();
            for (const key in online) {
                if (new Date(online[key]) < new Date(now - 120000)) {
                    delete online[key];
                }
            }
            saveOnline(online);
        }, 30000);

        // ============================================================
        // АВТО-ВХОД
        // ============================================================
        if (currentUser) {
            const users = getUsers();
            if (users[currentUser]) {
                showUser();
            } else {
                localStorage.removeItem('currentUser');
                currentUser = null;
            }
        }
    </script>
</body>
</html>
